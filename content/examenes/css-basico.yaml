slug: css-basico
titulo: Examen del módulo CSS básico
track: css
modulo: css-basico
aprobacion: 70
preguntas:
  - id: q1
    texto: "En la regla h1 { color: darkblue; }, ¿qué parte es el selector?"
    opciones:
      - "color"
      - "darkblue"
      - "h1"
      - "{ }"
    correcta: 2
    explicacion: "El selector dice a qué elementos se aplica la regla; acá, a todos los h1 de la página. color es la propiedad y darkblue el valor."
  - id: q2
    texto: "¿Qué separa la propiedad del valor en una declaración CSS?"
    opciones:
      - "Un punto y coma"
      - "Dos puntos"
      - "Un igual"
      - "Una coma"
    correcta: 1
    explicacion: "La forma es propiedad: valor; — dos puntos en el medio y punto y coma al final de cada declaración."
  - id: q3
    texto: "¿Cómo se conecta una hoja de estilos externa al HTML?"
    opciones:
      - "<style src=\"estilos.css\">"
      - "<link rel=\"stylesheet\" href=\"estilos.css\" /> dentro del head"
      - "<css href=\"estilos.css\"> dentro del body"
      - "Escribiendo el CSS dentro del title"
    correcta: 1
    explicacion: "La etiqueta link va en el head, con rel=\"stylesheet\" (la relación) y href (la ruta del archivo)."
  - id: q4
    texto: "¿Por qué conviene usar rem en vez de píxeles fijos para el tamaño de letra?"
    opciones:
      - "Porque rem carga más rápido"
      - "Porque respeta el tamaño de letra que el usuario configuró en su navegador"
      - "Porque los píxeles no funcionan en celulares"
      - "Porque rem es más nuevo"
    correcta: 1
    explicacion: "rem es relativo al tamaño base del sitio, así que si el usuario agranda la letra en su navegador, todo escala en proporción. Es una buena práctica de accesibilidad."
  - id: q5
    texto: "¿Qué hace font-family: system-ui, sans-serif; con la lista separada por comas?"
    opciones:
      - "Aplica las dos tipografías mezcladas"
      - "Usa la primera disponible; las siguientes son respaldo"
      - "Alterna una tipografía por párrafo"
      - "Es un error de sintaxis"
    correcta: 1
    explicacion: "Es una lista de respaldo: el navegador intenta con system-ui y, si no existe en el sistema, cae a cualquier sans-serif."
