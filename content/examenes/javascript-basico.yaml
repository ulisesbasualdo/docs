slug: javascript-basico
titulo: Examen del módulo JavaScript básico
track: javascript
modulo: js-basico
aprobacion: 70
preguntas:
  - id: q1
    texto: "¿Cuál es la diferencia entre const y let?"
    opciones:
      - "const es para números y let para textos"
      - "const no permite reasignar el valor; let sí"
      - "let es más rápido que const"
      - "No hay diferencia"
    correcta: 1
    explicacion: "const declara variables que no se pueden reasignar; let, variables que sí. La buena práctica es const por defecto y let solo cuando el valor va a cambiar."
  - id: q2
    texto: "¿Qué guarda la línea let productosEnCarrito = 0;?"
    opciones:
      - "El texto '0'"
      - "El número 0"
      - "Un booleano falso"
      - "Una lista vacía"
    correcta: 1
    explicacion: "Sin comillas, 0 es un number. Con comillas ('0') sería un string, que es un tipo distinto y no conviene mezclar."
  - id: q3
    texto: "En if (totalCompra >= 20000) { ... }, ¿qué tipo de valor produce la comparación?"
    opciones:
      - "Un número"
      - "Un texto"
      - "Un booleano: true o false"
      - "Una variable nueva"
    correcta: 2
    explicacion: "Toda comparación produce un booleano. El if ejecuta su bloque solo si el resultado es true."
  - id: q4
    texto: "¿Cuándo se ejecuta el bloque del else?"
    opciones:
      - "Siempre, después del if"
      - "Solo cuando la condición del if dio false"
      - "Solo cuando la condición del if dio true"
      - "Nunca, es decorativo"
    correcta: 1
    explicacion: "El else es el camino del no: se ejecuta únicamente cuando la condición del if no se cumplió."
  - id: q5
    texto: "¿Qué convención de nombres usa JavaScript para variables como productosEnCarrito?"
    opciones:
      - "snake_case"
      - "camelCase"
      - "kebab-case"
      - "MAYÚSCULAS"
    correcta: 1
    explicacion: "camelCase: palabras pegadas con mayúscula interna. Es la convención estándar para variables y funciones en JavaScript."
  - id: q6
    texto: "¿Qué hace el signo = en productosEnCarrito = productosEnCarrito + 1;?"
    opciones:
      - "Compara los dos lados"
      - "Calcula la derecha y guarda el resultado en la variable de la izquierda"
      - "Declara una variable nueva"
      - "Suma uno a ambos lados"
    correcta: 1
    explicacion: "El = es asignación, no igualdad: primero se evalúa la expresión de la derecha y el resultado se guarda en la variable."
