slug: html-fundamentos
titulo: Examen del módulo Fundamentos de HTML
track: html
modulo: fundamentos
aprobacion: 70
preguntas:
  - id: q1
    texto: "En la línea <h1>Tienda La Esquina</h1>, ¿qué parte es la etiqueta de cierre?"
    opciones:
      - "<h1>"
      - "Tienda La Esquina"
      - "</h1>"
      - "h1"
    correcta: 2
    explicacion: "La etiqueta de cierre es igual a la de apertura pero con la barra: </h1>. Marca dónde termina el contenido del título."
  - id: q2
    texto: "¿Qué sección de la página contiene lo que el visitante VE en pantalla?"
    opciones:
      - "<head>"
      - "<body>"
      - "<title>"
      - "<!doctype html>"
    correcta: 1
    explicacion: "El body es el cuerpo visible de la página. El head guarda información sobre el documento, como el título de la pestaña."
  - id: q3
    texto: "¿Para qué sirve el atributo alt en una imagen?"
    opciones:
      - "Define el tamaño de la imagen"
      - "Indica la carpeta donde está la imagen"
      - "Describe la imagen para quien no puede verla"
      - "Hace que la imagen cargue más rápido"
    correcta: 2
    explicacion: "El alt es el texto alternativo: lo leen los lectores de pantalla y se muestra si la imagen no carga. Es una regla clave de accesibilidad."
  - id: q4
    texto: "Si abriste <article> y adentro <h2>, ¿cuál es el orden correcto de cierre?"
    opciones:
      - "</article> y después </h2>"
      - "</h2> y después </article>"
      - "Da igual el orden"
      - "El article no se cierra"
    correcta: 1
    explicacion: "Las etiquetas se cierran de adentro hacia afuera, sin cruzarse: primero el hijo (h2), después el padre (article)."
  - id: q5
    texto: "¿Qué hace la primera línea <!doctype html>?"
    opciones:
      - "Crea el título de la pestaña"
      - "Le dice al navegador que use las reglas del HTML actual"
      - "Importa los estilos del sitio"
      - "Define el idioma de la página"
    correcta: 1
    explicacion: "El doctype avisa al navegador que el documento usa HTML moderno; sin él, algunos navegadores interpretan la página con reglas antiguas."
  - id: q6
    texto: "En <a href=\"/carrito\">Ir al carrito</a>, ¿qué define el atributo href?"
    opciones:
      - "El texto visible del enlace"
      - "El color del enlace"
      - "A dónde lleva el enlace al hacer clic"
      - "El grupo de estilos del enlace"
    correcta: 2
    explicacion: "href es el destino del enlace. El texto visible es el contenido entre las etiquetas, y los estilos se manejan con class y CSS."
