name: Build, test y deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verificar-y-construir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Tests con cobertura al 100%
        run: npm run test:coverage

      - name: Build con prerender para Pages
        run: npm run build:pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/docs/browser

  desplegar:
    needs: verificar-y-construir
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
